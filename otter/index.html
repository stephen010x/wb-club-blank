<!DOCTYPE html>
<html>
    <head>
        <title>Sea Otter Livestream</title>
        <style>
            /* * { cursor: none !important; }*/
            html, body {
                margin: 0;
                overflow: hidden;
                pointer-events: none;
                background-color: black;
            }
            iframe {
                position: fixed;
                right: 0;
                bottom: 0;
                min-width: 100%;
                min-height: 100%;
            }
            .qr-code1 {
                position: fixed;
                top: 0;
                left: 0;
                z-index: 9999; /* Ensures image is on top */
                opacity: 0.75;
            }
            .qr-code2 {
                position: fixed;
                bottom: 0;
                left: 0;
                z-index: 9999; /* Ensures image is on top */
                opacity: 0.5;
            }
        </style>

        <script>
            async function loadimage_sync(url) {
                let img = new Image();
                img.src = url;
                await img.decode();
                return img;
            }
        
            async function validVideoId(id) {
                let img = await loadimage_sync("http://img.youtube.com/vi/" + id + 
                                               "/mqdefault.jpg");
                if (img.width == 120) return false;
                return true;
            }

        
            const videos_ids = [
                'NqOmHpwMUxs',
                'abbR-Ttd-cA',
                '_KXHUb0wFRE',
                'SNU0TQMsHiI',
                'SnHke968zAA',
                'QhxCVRJrVHs',
                '5e4lsEe4Vew',
                '-uooI2satIQ',
            ];


            // fullscreen on click functionality
            document.addEventListener('click', function() {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) { /* Safari */
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { /* IE11 */
                    elem.msRequestFullscreen();
                }
            });


            window.addEventListener('DOMContentLoaded', () => {

                document.body.style.cursor = '';

                const ifvideo = document.getElementById('video');

                // the wonderful world of async/await bs
                // you enforce stupid syntax, you get stupid solutions
                (async () => {
                    //console.log(await validVideoId("NqOmHpwMUxs"));

                    // randomly picks video ids to play
                    // if one id is invalid, it will keep trying until
                    // it finds a working one
                    for (let i = 0; i < videos_ids.length; i++) {

                        index = Math.floor(Math.random() * videos_ids.length)
                        // pop item from array
                        id = videos_ids.splice(index, 1)[0];

                        // if video valid
                        if (await validVideoId(id)) {

                            console.log("playing video id \""+ id +"\"")

                            ifvideo.src = "https://www.youtube-nocookie.com/embed/" + 
                                id + 
                                "?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0";

                            break;
                            
                        } else {

                            console.log("WARNING: Stream id \""+ id +"\" is broken");
                        
                        }
        
                    }
                    
                })()
                
            });
        </script>
        
    </head>
    <body>

        <img width="auto" height="40%" src="../qr-code.webp" class="qr-code1">
        <!--img width="auto" height="35%" src="../summer_form_qr.png" class="qr-code2"-->

        <iframe 
            style="max-width=100%; max-height=100%"
            id="video"
            src="https://www.youtube-nocookie.com/embed/_KXHUb0wFRE?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0" 
            frameborder="0" allow="autoplay; encrypted-media"
        allowfullscreen></iframe>

    </body>
</html>
